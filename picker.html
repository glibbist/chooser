<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪩Picker⛏️</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .game-list {
            max-height: 50vh;
            overflow-y: auto;
        }
        .selected-count {
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
            padding: 10px 0;
        }
        .filter-section {
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 1px solid #dee2e6;
        }
        .year-sliders {
            display: grid;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="filter-section">
            <div class="mb-3">
                <button class="btn btn-primary w-100" onclick="pickRandom()">Pick Random Game</button>
            </div>
            <div id="result" class="alert alert-info m-3" style="display: none;"></div>
            <div class="mb-3">
                <label class="form-label">Year Range:</label>
                <div class="year-sliders">
                    <div>
                        <label>Min: <span id="minYearDisplay"></span></label>
                        <input type="range" class="form-range" id="minYear" min="1970" max="2024" step="1">
                    </div>
                    <div>
                        <label>Max: <span id="maxYearDisplay"></span></label>
                        <input type="range" class="form-range" id="maxYear" min="1970" max="2024" step="1">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Manufacturer:</label>
                <select class="form-select" id="manufacturerSelect" onchange="filterGames()">
                    <option value="">All Manufacturers</option>
                </select>
            </div>

            <div class="btn-group w-100 mb-3">
                <button class="btn btn-outline-primary" onclick="toggleFiltered(true)">Select All Filtered</button>
                <button class="btn btn-outline-primary" onclick="toggleFiltered(false)">Deselect All Filtered</button>
            </div>
            
            <div class="selected-count" id="selectedCount"></div>
        </div>

        <div class="game-list">
            <table class="table table-hover">
                <tbody id="gameTable">
                </tbody>
            </table>
        </div>
    </div>

://www.kineticist.com/pinball-machines/white-water-1993","opdb_id":"GRQKz-MyNXz","commonName":"White Water"},{"id":707,"name":"World Cup Soccer","year":1994,"manufacturer":"Bally","ipdb_link":"https://www.ipdb.org/machine.cgi?id=2811","ipdb_id":2811,"kineticist_url":"https://www.kineticist.com/pinball-machines/world-cup-soccer-1994","opdb_id":"G42E2-MQP9e","commonName":"World Cup Soccer"}];
        
        // Initialize game states
        let filteredGames = [];
        let manufacturers = [...new Set(games.map(g => g.manufacturer))].sort();
        let minYear = Math.min(...games.map(g => g.year));
        let maxYear = Math.max(...games.map(g => g.year));

        // Initialize UI
        const minYearInput = document.getElementById('minYear');
        const maxYearInput = document.getElementById('maxYear');
        
        minYearInput.min = minYear;
        minYearInput.max = maxYear;
        maxYearInput.min = minYear;
        maxYearInput.max = maxYear;
        
        minYearInput.value = minYear;
        maxYearInput.value = maxYear;
        
        document.getElementById('minYearDisplay').textContent = minYear;
        document.getElementById('maxYearDisplay').textContent = maxYear;

        const manufacturerSelect = document.getElementById('manufacturerSelect');
        manufacturers.forEach(m => {
            manufacturerSelect.innerHTML += `<option>${m}</option>`;
        });

        // Add selected property to all games
        games.forEach(g => g.selected = true);

        function renderGames() {
            const tbody = document.getElementById('gameTable');
            tbody.innerHTML = '';
            
            filteredGames.forEach(game => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" 
                                   ${game.selected ? 'checked' : ''} 
                                   onchange="toggleGame(${game.id}, this.checked)">
                            <label class="form-check-label">
                                ${game.commonName} (${game.year})<br>
                                <small class="text-muted">${game.manufacturer}</small>
                            </label>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('selectedCount').textContent = 
                `${games.filter(g => g.selected).length} of ${games.length} selected`;
        }

        function filterGames() {
            const minYear = parseInt(minYearInput.value);
            const maxYear = parseInt(maxYearInput.value);
            const manufacturer = document.getElementById('manufacturerSelect').value;
            
            filteredGames = games.filter(g => 
                g.year >= minYear && 
                g.year <= maxYear && 
                (manufacturer === '' || g.manufacturer === manufacturer)
            );
            
            renderGames();
        }

        function handleYearChange() {
            // Ensure min doesn't exceed max and vice versa
            if (parseInt(minYearInput.value) > parseInt(maxYearInput.value)) {
                maxYearInput.value = minYearInput.value;
            }
            if (parseInt(maxYearInput.value) < parseInt(minYearInput.value)) {
                minYearInput.value = maxYearInput.value;
            }
            
            document.getElementById('minYearDisplay').textContent = minYearInput.value;
            document.getElementById('maxYearDisplay').textContent = maxYearInput.value;
            filterGames();
        }

        function toggleGame(id, selected) {
            const game = games.find(g => g.id === id);
            if (game) game.selected = selected;
            renderGames();
        }

        function toggleFiltered(select) {
            filteredGames.forEach(g => g.selected = select);
            renderGames();
        }

        function pickRandom() {
            const selectedGames = games.filter(g => g.selected);
            if (selectedGames.length === 0) {
                alert('No games selected!');
                return;
            }
            
            const randomGame = selectedGames[Math.floor(Math.random() * selectedGames.length)];
            const result = document.getElementById('result');
            result.innerHTML = `
                <h4>${randomGame.commonName}</h4>
                <p>${randomGame.manufacturer} (${randomGame.year})</p>
            `;
            result.style.display = 'block';
        }

        // Event listeners
        minYearInput.addEventListener('input', handleYearChange);
        maxYearInput.addEventListener('input', handleYearChange);

        // Initial render
        filterGames();
    </script>
</body>
</html>
