name: Execute Script Validation

on:
  workflow_dispatch:  # Testing only

jobs:
  path_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Node.js + axios
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Axios (again for sanity)
        run: npm install axios
      
      - name: Check for Script Presence
        run: ls -R  # List all files recursively from root

      - name: Run Script
        run: node .github/workflows/scripts/update-games.js
