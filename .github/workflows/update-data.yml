name: Update Games Data

on:
  schedule:
    - cron:  '0 0 * * *' # Runs daily at midnight
  workflow_dispatch:  # Allow manual triggering

jobs:
  update:
    name: Sync Pinball Data
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install axios

      - name: Update data.json
        run: node .github/workflows/scripts/update-games.js

      - name: Git Stage Changes
        id: stage
        run: git add data.json

      - name: Verify File Changes
        id: diff-check
        run: |
          if (( git diff --quiet )); then
            echo "is_git_clean=true" >> $GITHUB_ENV
          else
            echo "is_git_clean=false" >> $GITHUB_ENV
          fi

      - name: Commit Only When Changed
        if: env.is_git_clean == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Automated: data.json updated from action run"
          git push origin main  # << Replace 'main' with your default branch
