name: Pinball JSON Maintenance

on:
  workflow_dispatch: # Trigger manually
  # schedule:  # Enable when ready
  #   - cron: '0 0 * * *'

jobs:
  automaintain:
    runs-on: ubuntu-latest

    steps:
    - name: Secure Repository
      uses: actions/checkout@v3

    - name: Setup Node.js Environment
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Install Axios
      run: npm install axios

    - name: Execute Script File
      run: |
          cd "${{ github.workspace }}"
          node .github/workflows/scripts/update-games.js

     # Scoped File Verification
    - name: Verify JSON Updates
      id: json_check
      shell: bash
      run: |
          git --no-pager diff --exit-code -- data.json
          if [ $? -eq 0 ]; then
              echo "RESULT_JSON=unchanged" >> $GITHUB_ENV  # Proper environment syntax
          else
              echo "RESULT_JSON=modified" >> $GITHUB_ENV  # Using ENV method
          fi

    # Conditional Push Logic
    - name: Perform GitHub Commit/Push *Only When Necessary*
      if: env.RESULT_JSON == 'modified'
      run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add data.json  # Add modifications

          # Commit message with proper check (prevent blanks)
          if git diff-index --quiet HEAD; then
              echo "No differences remain after git add; abort."  
          else
              echo "Committing updated content..."
              git commit -m 'AUTO-UPDATE: New data.json modifications in play'

              # Push back to repository
              git push origin main  # << Adjust branch as needed
          fi
