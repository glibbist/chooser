name: Pin-ball JSON Syncer

on:
  workflow_dispatch:
  # Schedule prod (uncomment)
  # schedule:
  #  - cron: '0 0 * * *'

jobs:
  data_sync:
    runs-on: ubuntu-latest
    # GitHub Token Permissions
    env:
      CI: true
    permissions:
      contents: write

    steps:
    - name: Clone Repository + Auth via Token
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # All commits for git diff analysis
        token: ${{ secrets.GITHUB_TOKEN }}  # Preauth Token

    - name: Set Up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Install axios (HTTP/S)
      run: npm install axios

    - name: Execute Pin-ball Data Sync Script
      run: |
          cd "${{ github.workspace }}"
          node .github/workflows/scripts/update-games.js

    - name: Display JSON Processed Data
      run: |
          echo "--------- Processed JSON data.json file: ----------"
          cat "${{ github.workspace }}/data.json"
  
    - name: Confirm JSON Updates
      id: changes
      run: |
          git diff --exit-code data.json  # Compares exact changes (inc. newlines)
          echo "::set-output name=has_changed::$?"  # Exit 0 = no change

    - name: Git Config and Commit (if changes)
      if: steps.changes.outputs.has_changed != '0'
      run: |
        git config --global user.name 'github-actions[bot]' 
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

        git add data.json  # Prepare stage

        git diff --cached  # Pre-commit verify
        git commit -m "AUTO-UPD: Scheduled JSON sync applied latest"

        git push origin main  # << Substitute main with yours
      # Auth with GitHub token
      env: 
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Repository auto-configured
