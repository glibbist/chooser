name: Pinball JSON Maintenance

on: 
  workflow_dispatch:
  # Example: For future scheduling, uncomment
  # schedule:
  #   - cron: '0 0 * * *' # Runs daily at midnight

jobs:
  auto_pinball_sync:
    runs-on: ubuntu-latest
    # Ensure permissions
    permissions:
      contents: write

    steps:
    - name: Checkout All Branch Commits
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Complete history needed

    - name: Setup Node for Script 
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Axios Library Installation
      run: npm install axios

    - name: Run Node.js Data Collection Script
      run: |
        cd "${{ github.workspace }}"
        node .github/workflows/scripts/update-games.js

    - name: Verify JSON File Created & Formatting
      run: |
        echo "JSON data post-script:"
        ls -la "${{ github.workspace }}"
        cat "${{ github.workspace }}/data.json"  # Ensure path and extension
        
    - name: Capture Update Status (JSON has new changes)
      id: json_validation
      run: |
        git diff --exit-code data.json
        if [ $? -eq 0 ]; then
          echo "CHANGES_DETECTED=false" >> $GITHUB_ENV
        else
          echo "CHANGES_DETECTED=true" >> $GITHUB_ENV
        fi

    - name: Setup Git Config (Commit)
      if: env.CHANGES_DETECTED == 'true'
      run: |
        git config --global user.name 'github-actions[bot]' 
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    # Commit & Push: Only if changes detected
    - name: Commit and Push Updates
      if: env.CHANGES_DETECTED == 'true'
      run: |
        # Stage updates
        git add data.json  # Path inside workspace

        # Confirm staged additions
        git diff --cached --stat
        echo "Committing updated JSON..."
        git commit -m 'AUTO-UPD: Pin-ball data sync commit'
        git push origin main  # << Adjust main to whatever repo branch

      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # This comes pre-configured
