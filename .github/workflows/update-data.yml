name: Update and Sync GitHub Pinball JSON

on:
  # Comment this out while debugging:
  # schedule:
  #   - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:

jobs:
  update_pinball_json:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js v20
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Install Axios
      run: npm install axios

    - name: Execute Data Update Script
      id: update-script
      run: |
          cd "${{ github.workspace }}"  # Always navigate to working repo root
          node .github/workflows/scripts/update-games.js

    - name: Verify JSON Data Updates (Optional Debug)
      run: |
          echo "JSON file after script run:"
          cat data.json   # Display content to review

    - name: Check for JSON Data Changes
      id: file_check
      run: |
        git --no-pager diff --exit-code -- data.json  # Scoped diff test!
        echo "CHANGED_STATUS=$?" >> $GITHUB_ENV

    - name: Commit & Push if Data Changed
      if: env.CHANGED_STATUS != '0'   # Status=0 means NO changes
      run: |
          set -ex  # Enables debug for any fail steps

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json  # Only track JSON modifications
          
          diff_msg=$(git diff --staged --color)
          if [[ -n "$diff_msg" ]]; then
              echo "Auto-changes being committed"
              git commit -m "AUTO-COMMIT: Synced data.json from latest fetch"
              git push origin main  # << REPLACE with your branch name
          else
              echo "No changes to commit; aborting"
              git status
          fi
