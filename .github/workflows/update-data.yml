name: Sync Pinball Data

on:
  schedule:
    - cron:  '0 0 * * *' # Daily at midnight
  workflow_dispatch:  # Allow manual testing

jobs:
  updateData:
    name: Fetch data & sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Node.js (v18)
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Axios (external dependency)
        run: npm install axios

      - name: Execute Script
        run: node .github/workflows/scripts/update-games.js

      - name: Check if Data Needs Commit
        id: diffCheck
        run: |
          git diff --exit-code data.json  # Focus on *this* file only
         # Skip if previous `data.json` commit (ignore untracked files)
          if (! $?); then
            echo "hasChanges=true" >> $GITHUB_ENV  # Changes detected
          fi

      - name: Commit JSON Updates (Only When Changed)
        if: env.hasChanges == 'true'
        run: |
          cd "${{ github.workspace }}"  # Return to CWD
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json 
          git commit -m "Auto-sync data.json (action)" && git push origin main  # Use correct main/default!
