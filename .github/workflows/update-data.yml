name: Pin-ball JSON Synchronizer

on:
  workflow_dispatch:
  # Schedule example (daily sync at midnight)
  # schedule:
  #   - cron: '0 0 * * *'

jobs:
  auto_sync_data:
    runs-on: ubuntu-latest
    env:
      CI: true
    permissions:
      contents: write  # Required for commit and update permissions

    steps:

    # Step 1: Git Repository Checkout
    - name: Checkout Repo
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # Step 2: Setup Node.js environment for script execution
    - name: Setup Environment
      uses: actions/setup-node@v3
      with:
        node-version: 20  
    - name: Install Axios (Dep)
      run: npm install axios

    # Step 3: Execute Data Update Script
    - name: Run Async Data Update Script
      run: |
        cd "${{ env.GITHUB_WORKSPACE }}"
        node .github/workflows/scripts/update-games.js  # (full path)
      
    # Debugging step to observe data.json output
    - name: Display JSON Results
      run: |
        echo "--------- data.json after script execution: ----------"
        cat "${{ github.workspace }}/data.json"

    # Git-Diff Step
    - name: Check File Diff for Changes
      id: file_check
      run: |
        git diff --exit-code data.json  # Compares with expected format (inc newlines)
        echo "::set-output name=has_changed::$?"  # Capture exit code

    # Git Configuration (Bot Account)
    - name: Git Setup (Git Config)
      if: steps.file_check.outputs.has_changed != '0'  # Only configure if changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"   

    # Commit/Push: Only if differences found
    - name: Commit and Push JSON Data Update
      if: steps.file_check.outputs.has_changed != '0'
      run: |
        git add data.json  # Add specific file

        # Final Commit
        git commit -m "AUTO-UPD: Synchronized JSON pin-ball data updates"
        
        git push origin main  # Substitute main if required
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Auth Token used for pushing
