name: Pin-ball JSON Updater

on:
  workflow_dispatch:
    # Uncomment when testing complete:
    # schedule:
    #   - cron: '0 0 * * *'  # Daily

jobs:
  auto-update:
    runs-on: ubuntu-latest

    steps:
    # First Step: Checkout
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Setup Environment
    - name: Set Up Node.js v20
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Install Axios
      run: npm install axios

    # Run Script
    - name: Execute Data Update Script
      run: |
          cd "${{ github.workspace }}"
          node .github/workflows/scripts/update-games.js

    # File Checks: (JSON Update Confirmation)
    - name: Confirm JSON Updated
      id: file_check
      shell: bash
      run: |
          CHANGE_STATUS=$(git diff --exit-code data.json)
          if [ $? -eq 0 ]; then  
              # No changes, set ENV to false
              echo "::set-env name=CHANGES_MADE::false"
          else
              echo "::set-env name=CHANGES_MADE::true" 
          fi

    # Conditionally Commit
    - name: Push Data Updates (If Changed)
      if: env.CHANGES_MADE == 'true'
      run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # Only stage updated file! (JSON)
          git add data.json

          # Check staged changes before commit
          DIFF_SUMMARY=$(git diff --staged)
          if [ -n "${DIFF_SUMMARY// }" ]; then   # Check if space-stripped string has content
              echo "Changes detected; proceeding to commit/push:"
              git commit -m 'AUTO-UPDATE: Sync data.json'
              git push origin main  # Adjust for correct branch
          else
              echo "No changes detected post-script run"
          fi
