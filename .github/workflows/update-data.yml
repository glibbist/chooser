name: Update Games Data

on:
  schedule:
    - cron:  '0 0 * * *' # Runs daily at midnight
  workflow_dispatch:  # Allow manual triggering

jobs:
  update:
    name: Sync Pinball Data
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install axios

      - name: Update data.json
        run: node .github/workflows/scripts/update-games.js

      - name: Git Stage Changes
        id: stage
        run: git add data.json

      - name: Verify File Changes
        id: diff-check
        run: |
          if (( git diff --quiet )); then
            echo "is_git_clean=true" >> $GITHUB_ENV
          else
            echo "is_git_clean=false" >> $GITHUB_ENV
          fi

      - name: Commit Changes if Detected
        if: env.is_git_clean == 'false'
        run: |
          cd "${{ github.workspace }}"  # Important: Change back to repo root directory
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json  
          if [ -z "$(git status --porcelain)" ]; then
              echo "No changes to commit, skipping commit"
          else
              git commit -m "Automatic Update: data.json changed"
              git push origin main  # << Replace with your default!
          fi
