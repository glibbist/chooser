name: JSON Auto-Syncer (Pin-ball data)

# Triggers: manual dispatch or scheduled updates
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Daily UTC midnight (optional)

jobs:
  data_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for Git push operations

    steps:
    - name: Clone Repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # All versions for history checks

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20  # Validate compatibility

    - name: Install axios (Dependency)
      run: npm install axios

    - name: Run Sync Script
      run: |
        cd "${{ github.workspace }}"
        node .github/workflows/scripts/update-games.js   # Full path

    - name: Verify JSON Output
      run: cat "${{ github.workspace }}/data.json"

    - name: Check Version Control Changes
      id: change_check
      run: git diff --exit-code data.json
      continue-on-error: true  # Allow step even with differences

    - name: Git Prep for Commit
      if: ${{ steps.change_check.outcome == 'failure' }}
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Push Data.json Update
      if: ${{ steps.change_check.outcome == 'failure' }}
      run: |
        git add data.json
        git commit -m "AUTO-COMMIT: Pin-ball synced JSON update"
        git push origin main  # Adjust to target branch if needed

      env:  # Environment vars
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Automatic auth
