name: Validate and Update Pinball JSON

on:
  # Schedule (uncomment when ready):
  # schedule:
  #   - cron: '0 0 * * *'  # Daily at midnight
  workflow_dispatch:  # Test run manually first!

jobs:
  update_data:
    runs-on: ubuntu-latest

    steps:
    # === CHECKOUT REPO ====
    - name: Checkout Repository   # Mandatory first step
      uses: actions/checkout@v3

    # === NODE.JS & AXIOS ====
    - name: Setup Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Install axios for HTTP Requests (dependency)
      run: npm install axios

    # === EXECUTE SCRIPT ====
    - name: Run Node Script (Script Execution)
      run: node .github/workflows/scripts/update-games.js

    - name: Verify JSON Change (File Changed?)
      id: changedFiles
      run: |
          cd "${{ github.workspace }}"
          CHANGED=$(git diff --name-only | grep 'data.json' || true)

          if [ -n "$CHANGED" ]; then
              echo "JSON File has changed!"
              echo "file_changed=true" >> $GITHUB_ENV
  
              # Additionally display first lines to confirm changes
              printf "\nFirst 20 lines of updated data.json:\n"
              head -n20 data.json
          else 
              echo "JSON File has NO changes."
              echo "file_changed=false" >> $GITHUB_ENV
          fi

    # === COMMIT LOGIC ====
    - name: Commit & Push Updated data.json
      if: env.file_changed == 'true'
      run: |
          cd "${{ github.workspace }}"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git status -s   # Optional status for debugging

          if ! git diff-index --quiet HEAD; then
              echo "> Commit new Data.json Update"
              git commit -m "AUTO-UPDATE: Refresh data.json from remote API" || echo "Commit failed!"
              git push origin main # << CHANGE TO YOUR 'default' branch if NOT main
          else
              echo "> No changes to commit; nothing to push."
          fi
